    - GET    https://{subdomain}.kinde.com/api/v1/organizations
    - POST   https://{subdomain}.kinde.com/api/v1/organization
    - GET    https://{subdomain}.kinde.com/api/v1/organizations/{org_code}/users
    - GET    https://{subdomain}.kinde.com/api/v1/roles
    - GET    https://{subdomain}.kinde.com/api/v1/permissions
    - POST   https://{subdomain}.kinde.com/api/v1/feature_flags
    - GET    https://{subdomain}.kinde.com/api/v1/applications
    - GET    https://{subdomain}.kinde.com/api/v1/connections
    - GET    https://{subdomain}.kinde.com/api/v1/directories
    - GET    https://{subdomain}.kinde.com/api/v1/apis
    - GET    https://{subdomain}.kinde.com/api/v1/apis/{api_id}/scopes
    - GET    https://{subdomain}.kinde.com/api/v1/api_keys
    - POST   https://{subdomain}.kinde.com/api/v1/api_keys/verify
    - GET    https://{subdomain}.kinde.com/api/v1/subscribers
    - GET    https://{subdomain}.kinde.com/api/v1/business
    - GET    https://{subdomain}.kinde.com/api/v1/industries
