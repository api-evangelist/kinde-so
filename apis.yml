aid: kinde-so
url: https://raw.githubusercontent.com/api-evangelist/kinde-so/refs/heads/main/apis.yml
name: Kinde
kind: company
description: Kinde is an authentication and user management platform for SaaS and
  B2B applications - handling sign-up and login, multi-factor authentication,
  organizations, roles and permissions, feature flags, and usage-based billing.
  The Kinde Management API programmatically manages a Kinde business over a
  subdomain-scoped base URL (https://{yourbusiness}.kinde.com/api/v1),
  authenticated with a Bearer JWT obtained via the OAuth2 client_credentials flow
  from a machine-to-machine (M2M) application. Almost everything available in the
  Kinde admin UI - users, organizations, roles, permissions, feature flags,
  applications, connections, APIs and scopes, subscribers, properties, webhooks,
  and billing - is available through the API.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Authentication
- User Management
- Identity
- Authorization
- SaaS
- CIAM
