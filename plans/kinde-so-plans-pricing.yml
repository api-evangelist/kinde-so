specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Kinde
providerId: kinde-so
created: '2026-07-02'
modified: '2026-07-02'
reconciled: false
tags:
- Authentication
- User Management
- Identity
- SaaS
- MAU
- Plans
description: >-
  Kinde is priced primarily on Monthly Active Users (MAU). Every plan includes a
  large free MAU allowance (10,500 MAU at the time of writing); usage above the
  allowance is billed per additional MAU at a per-plan rate that decreases as you
  move up tiers. Users on a paid subscription (via Kinde's own billing product)
  are not counted toward MAU. Tiers are Free ($0), Pro ($25/mo), Plus ($75/mo,
  the recommended tier), and Scale ($250/mo), with Enterprise available on
  request. The Management API is included with every plan and has no separate
  per-call fee. Verify current prices and allowances on the Kinde pricing page
  during reconciliation.
notes: >-
  Additional usage-based costs exist alongside MAU: SMS is roughly $0.07 per
  message (or bring your own provider) and payment transaction fees on Kinde's
  billing product run about 0.5%-0.7% by tier. Enterprise SSO connections are
  included from the Plus tier up. Numbers reflect the pricing page as observed on
  the created date and should be reconciled before use.
sources:
- https://kinde.com/pricing/
- https://docs.kinde.com
- https://docs.kinde.com/kinde-apis/management/
plans:
- id: kinde-free
  name: Free
  type: free
  description: >-
    Free-forever tier including 10,500 MAU, email and social login, MFA, B2B
    organizations, a custom domain, 2 custom roles, and 10 feature flags. Full
    access to the Management API.
  entries:
  - label: Included MAU
    name: free_mau
    type: usage
    metric: users
    limit: 10500
    timeFrame: month
    geo: global
    unit: 1
    price: $0
    userMultiplied: false
