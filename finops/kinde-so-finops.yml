description: >-
  FinOps view of Kinde spend. Kinde is billed primarily on Monthly Active Users
  (MAU): each plan (Free, Pro, Plus, Scale) carries a base monthly subscription
  and a large included MAU allowance (10,500 at the time of writing), with usage
  above the allowance billed per additional MAU at a per-plan rate that drops as
  you move up tiers ($0.0175 Pro, $0.0163 Plus, $0.0151 Scale). Users on a paid
  subscription are excluded from the MAU count. The Management API is included at
  no extra per-call charge. Secondary metered costs include SMS (~$0.07/message)
  and payment transaction fees (~0.5%-0.7%) on Kinde's own billing product.
notes: >-
  Per-unit rates reflect the pricing page on the created date and are not
  reconciled here; verify on the Kinde pricing page. The dominant cost driver is
  MAU, so the primary optimization levers are managing active-user counts,
  choosing the tier whose per-MAU rate best fits your volume, and moving paid
  users onto subscriptions (which removes them from MAU).
