meters:
- name: monthly_active_users
  description: Monthly Active Users above the plan's included allowance, billed per additional MAU. The primary Kinde cost driver.
  unit: users
  aggregation: max
  dimensions:
  - account
  - plan
  - environment
- name: base_subscription
  description: Flat monthly plan subscription fee (Pro/Plus/Scale).
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
- name: sms_messages
  description: SMS messages sent for MFA and verification, billed per message (~$0.07) unless bringing your own provider.
  unit: messages
  aggregation: sum
  dimensions:
  - account
  - environment
- name: transaction_fees
  description: Payment transaction fees (~0.5%-0.7% by tier) on Kinde's own billing product.
  unit: percent
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Track MAU against the plan allowance monthly; monitor SMS volume and any transaction fees on the billing product.
- name: Allocation
  description: Use environments and organizations to attribute MAU and SMS spend to teams, tenants, or product lines.
- name: Optimization
  description: Choose the tier whose per-MAU rate matches your volume; move paid users onto subscriptions to remove them from MAU; bring your own SMS provider to cut per-message cost.
- name: Accountability
  description: Assign an owner to review monthly MAU trends against the allowance and forecast overage before it lands on the invoice.
