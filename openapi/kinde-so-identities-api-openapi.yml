openapi: 3.0.0
info:
  title: Kinde Management API Keys Identities API
  version: '1'
  description: The Kinde Management API programmatically manages a Kinde business - users, organizations, roles, permissions, feature flags, applications, connections, APIs and scopes, subscribers, properties, webhooks, and billing. Base URL is subdomain-scoped to your business (https://{subdomain}.kinde.com/api/v1). Authenticated with a Bearer JWT access token obtained via the OAuth2 client_credentials flow from a machine-to-machine (M2M) application. This document is grounded in the official Kinde Management API specification (https://api-spec.kinde.com/kinde-management-api-spec.yaml).
  contact:
    name: Kinde Support Team
    email: support@kinde.com
    url: https://docs.kinde.com
  termsOfService: https://docs.kinde.com/trust-center/agreements/terms-of-service/
servers:
- url: https://{subdomain}.kinde.com
  variables:
    subdomain:
      default: your_kinde_subdomain
      description: The subdomain generated for your business on Kinde.
security:
- kindeBearerAuth: []
tags:
- name: Identities
paths:
  /api/v1/identities/{identity_id}:
    get:
      tags:
      - Identities
      summary: Get identity
      operationId: GetIdentity
      description: "Returns an identity by ID\n\n<div>\n  <code>read:identities</code>\n</div>"
      parameters:
      - name: identity_id
        in: path
        required: true
        description: The unique identifier for the identity.
        schema:
          type: string
      responses:
        '200':
          description: OK
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '429':
          description: Too many requests - rate limited
      security:
      - kindeBearerAuth: []
    patch:
      tags:
      - Identities
      summary: Update identity
      operationId: UpdateIdentity
      description: "Update identity by ID.\n\n<div>\n  <code>update:identities</code>\n</div>"
      parameters:
      - name: identity_id
        in: path
        required: true
        description: The unique identifier for the identity.
        schema:
          type: string
      responses:
        '200':
          description: OK
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '429':
          description: Too many requests - rate limited
      security:
      - kindeBearerAuth: []
    delete:
      tags:
      - Identities
      summary: Delete identity
      operationId: DeleteIdentity
      description: "Delete identity by ID.\n\n<div>\n  <code>delete:identities</code>\n</div>"
      parameters:
      - name: identity_id
        in: path
        required: true
        description: The unique identifier for the identity.
        schema:
          type: string
      responses:
        '200':
          description: OK
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '429':
          description: Too many requests - rate limited
      security:
      - kindeBearerAuth: []
components:
  securitySchemes:
    kindeBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Requires an access token obtained using the OAuth2 client_credentials flow from an authorized M2M application.
