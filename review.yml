sources:
  - url: https://docs.kinde.com/kinde-apis/management/
    type: APIReference
    note: Management API reference; all endpoints are HTTPS REST under /api/v1. No WebSocket mentioned.
  - url: https://api-spec.kinde.com/kinde-management-api-spec.yaml
    type: OpenAPI
    note: Official Kinde Management API OpenAPI 3.0 spec (101 paths, 175 operations). Bearer JWT security only; REST throughout.
  - url: https://docs.kinde.com/developer-tools/kinde-api/connect-to-kinde-api/
    type: Documentation
    note: Auth is OAuth2 client_credentials from an M2M app; Bearer JWT. Request/response, not WebSocket.
  - url: https://docs.kinde.com/developer-tools/kinde-api/api-rate-limits/
    type: Documentation
    note: Rate limiter and concurrency limiter; 429 on throttle with RateLimit-Reset header. REST semantics.
  - url: https://github.com/kinde-oss
    type: SourceCode
    note: Open-source SDKs and OpenAPI-based SDK generators. The API service itself is hosted/commercial.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Kinde's own public API is
    request/response REST (the Management API) plus OAuth2/OIDC auth endpoints
    and outbound webhooks. No AsyncAPI document was created because there is no
    client-facing server-push transport (WebSocket or SSE) on Kinde's own API to
    model; asynchronous events are delivered by Kinde POSTing signed webhook
    payloads to endpoints registered through the Webhooks API.
